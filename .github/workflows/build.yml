name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Check Android environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "JAVA_HOME=$JAVA_HOME"
          ls -la $ANDROID_HOME 2>/dev/null || echo "ANDROID_HOME not found"
          ls -la /usr/local/lib/android/sdk 2>/dev/null || echo "No Android SDK at /usr/local/lib/android/sdk"

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
          cache-disabled: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties
        run: |
          if [ -d "$ANDROID_HOME" ]; then
            echo "sdk.dir=$ANDROID_HOME" > local.properties
          elif [ -d "/usr/local/lib/android/sdk" ]; then
            echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
          else
            echo "sdk.dir=$HOME/android-sdk" > local.properties
          fi
          cat local.properties

      - name: Build Debug APK
        run: |
          echo "=== Starting Gradle build ==="
          echo "PWD=$(pwd)"
          ls -la
          ./gradlew --version 2>&1 || true
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
          echo "=== BUILD EXIT CODE: $? ==="

      - name: Show build result
        if: always()
        run: |
          echo "=== Build log ==="
          cat build.log 2>/dev/null || echo "No build.log"
          echo ""
          echo "=== APK files ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug APK directory"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: course-manager-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 5

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 5