name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        id: setup-android
        uses: android-actions/setup-android@v3
        with:
          packages: "build-tools;34.0.0 platforms;android-34"

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
          cache-disabled: true

      - name: Create local.properties
        run: |
          echo "sdk.dir=${{ steps.setup-android.outputs.sdk-root }}" > local.properties

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --no-daemon 2>&1 | tee build.log
        env:
          ANDROID_HOME: ${{ steps.setup-android.outputs.sdk-root }}
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8"

      - name: Show build result
        if: always()
        run: |
          echo "=== Build log (last 200 lines) ==="
          tail -200 build.log || true
          echo ""
          echo "=== APK files ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug APK directory"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: course-manager-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 5

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 5