name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "build-tools;34.0.0 platforms;android-34"

      - name: Show Android SDK path
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          if [ -d "/opt/hostedtoolcache/Android" ]; then
            echo "Found Android SDK at /opt/hostedtoolcache/Android"
            ls -la /opt/hostedtoolcache/Android
          fi
          if [ -d "$HOME/android-sdk" ]; then
            echo "Found Android SDK at $HOME/android-sdk"
            ls -la $HOME/android-sdk
          fi

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
          cache-disabled: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties
        run: |
          # Try multiple possible SDK locations
          if [ -n "$ANDROID_HOME" ] && [ -d "$ANDROID_HOME" ]; then
            echo "Using ANDROID_HOME=$ANDROID_HOME"
          elif [ -d "/opt/hostedtoolcache/Android/sdk" ]; then
            export ANDROID_HOME="/opt/hostedtoolcache/Android/sdk"
            echo "Using /opt/hostedtoolcache/Android/sdk"
          elif [ -d "$HOME/android-sdk" ]; then
            export ANDROID_HOME="$HOME/android-sdk"
            echo "Using $HOME/android-sdk"
          else
            echo "WARNING: Could not find Android SDK"
          fi
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cat local.properties

      - name: Build Debug APK
        run: |
          echo "=== Environment ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "PWD=$(pwd)"
          echo "GRADLE_OPTS=$GRADLE_OPTS"
          echo "=== Running Gradle ==="
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "=== EXIT CODE: $EXIT_CODE ==="
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8"

      - name: Show build result
        if: always()
        run: |
          echo "=== Build log ==="
          cat build.log 2>/dev/null || echo "No build.log"
          echo ""
          echo "=== APK files ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug APK directory"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: course-manager-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 5

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 5