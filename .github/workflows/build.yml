name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "build-tools;34.0.0 platforms;android-34"

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
          cache-disabled: true

      - name: Show environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "JAVA_HOME=$JAVA_HOME"
          echo "PATH=$PATH"
          ls -la /opt/hostedtoolcache/android* 2>/dev/null || echo "No android in /opt"
          ls -la $HOME/android* 2>/dev/null || echo "No android in HOME"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cat local.properties

      - name: Build Debug APK
        run: |
          echo "=== Environment before build ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "PWD=$(pwd)"
          echo "GRADLE_OPTS=$GRADLE_OPTS"
          ls -la gradlew
          cat gradlew | head -20
          ./gradlew assembleDebug --no-daemon --info 2>&1 | tee build.log
          BUILD_EXIT=$?
          echo "=== BUILD EXIT CODE: $BUILD_EXIT ==="
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8"

      - name: Show build result
        if: always()
        run: |
          echo "=== Build log (first 100 lines) ==="
          head -100 build.log 2>/dev/null || echo "No build.log"
          echo ""
          echo "=== Build log (last 100 lines) ==="
          tail -100 build.log 2>/dev/null || echo "No build.log"
          echo ""
          echo "=== APK files ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug APK directory"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: course-manager-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 5

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 5