name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Check environment
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version

      - name: Install Gradle
        run: |
          if ! command -v gradle &> /dev/null; then
            echo "Gradle not found, installing..."
            wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -O /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /opt
          fi
          export PATH=/opt/gradle-8.5/bin:$PATH
          gradle --version

      - name: Create local.properties
        run: |
          if [ -n "$ANDROID_HOME" ] && [ -d "$ANDROID_HOME" ]; then
            echo "sdk.dir=$ANDROID_HOME" > local.properties
          elif [ -d "/usr/local/lib/android/sdk" ]; then
            echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
          else
            echo "sdk.dir=$HOME/android-sdk" > local.properties
          fi
          cat local.properties

      - name: Build Debug APK
        run: |
          export PATH=/opt/gradle-8.5/bin:$PATH
          set -e
          gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Show build result
        if: always()
        run: |
          echo "=== Build log ==="
          cat build.log 2>/dev/null || echo "No build.log"
          echo ""
          echo "=== APK files ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug APK directory"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: course-manager-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 5

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 5